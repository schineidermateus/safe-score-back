security:
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        api:
            pattern: ^/(api|auth|organizations)
            stateless: true
            lazy: true
            user_checker: App\Identity\Infrastructure\Security\ProductionUserChecker
            entry_point: App\Identity\Infrastructure\Security\ApiAuthenticationEntryPoint

when@dev:
    security:
        firewalls:
            api:
                security: false
        access_control:
            - { path: ^/(_(profiler|wdt)), roles: PUBLIC_ACCESS }
            - { path: ^/health$, roles: PUBLIC_ACCESS }
            - { path: ^/api/docs, roles: PUBLIC_ACCESS }
            - { path: ^/api/v1, roles: PUBLIC_ACCESS }
            - { path: ^/auth, roles: PUBLIC_ACCESS }
            - { path: ^/organizations, roles: PUBLIC_ACCESS }

when@test:
    security:
        firewalls:
            api:
                security: false
        access_control:
            - { path: ^/health$, roles: PUBLIC_ACCESS }
            - { path: ^/api/docs, roles: PUBLIC_ACCESS }
            - { path: ^/api/v1, roles: PUBLIC_ACCESS }
            - { path: ^/auth, roles: PUBLIC_ACCESS }
            - { path: ^/organizations, roles: PUBLIC_ACCESS }

when@prod:
    security:
        firewalls:
            api:
                access_token:
                    token_handler: App\Identity\Infrastructure\Security\JwtAccessTokenHandler
                    failure_handler: App\Identity\Infrastructure\Security\ApiAuthenticationFailureHandler
        access_control:
            - { path: ^/health$, roles: PUBLIC_ACCESS }
            - { path: ^/api/docs, roles: PUBLIC_ACCESS }
            - { path: ^/(auth|organizations), roles: ROLE_USER }
            - { path: ^/api/v1, roles: ROLE_USER }

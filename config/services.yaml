# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Infrastructure\Security\TokenService:
        arguments:
            $jwtSecret: '%env(JWT_SECRET)%'
    App\Infrastructure\Middleware\ErrorMiddleware:
        tags:
            - { name: kernel.event_subscriber }
    App\Http\Controller\:
        resource: '../src/Http/Controller/'
        tags: [ 'controller.service_arguments' ]
        public: true
    App\Infrastructure\Normalizer\ResourceNormalizer:
        tags: [ 'serializer.normalizer' ]
    App\Infrastructure\Listener\ApiResponseListener:
        arguments:
            $serializer: '@serializer'
        tags:
            - { name: kernel.event_subscriber }
    App\Infrastructure\Security\JwtAuthenticator:
        arguments:
            $usuarioSessaoService: '@App\Domain\Usuario\Service\UsuarioSessaoService'
            $usuarioRepository: '@App\Domain\Usuario\Repository\UsuarioRepository'
    App\Shared\Controller\BaseController:
        shared: false
    App\Shared\Interface\RedisInterface:
        class: App\Shared\Service\RedisService
        arguments:
            $host: '%env(REDIS_HOST)%'
            $port: '%env(int:REDIS_PORT)%'

parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'

    App\Identity\Domain\Repository\UserRepository:
        alias: App\Identity\Infrastructure\Persistence\Doctrine\DoctrineUserRepository
    App\Organizations\Domain\Repository\OrganizationRepository:
        alias: App\Organizations\Infrastructure\Persistence\Doctrine\DoctrineOrganizationRepository
    App\Organizations\Domain\Repository\OrganizationMembershipRepository:
        alias: App\Organizations\Infrastructure\Persistence\Doctrine\DoctrineOrganizationMembershipRepository
    App\Customers\Domain\Repository\CustomerRepository:
        alias: App\Customers\Infrastructure\Persistence\Doctrine\DoctrineCustomerRepository
    App\Shared\Application\Transaction\TransactionManagerInterface:
        alias: App\Shared\Infrastructure\Persistence\Doctrine\DoctrineTransactionManager

    App\Customers\Infrastructure\OpenApi\CustomerOpenApiFactory:
        decorates: 'api_platform.openapi.factory'
        arguments:
            $decorated: '@.inner'

    App\Identity\Application\Context\CurrentUserProviderInterface:
        alias: App\Identity\Infrastructure\Context\UnavailableCurrentUserProvider
    App\Organizations\Application\Context\CurrentOrganizationProviderInterface:
        alias: App\Organizations\Infrastructure\Context\UnavailableCurrentOrganizationProvider
    App\Organizations\Application\Context\CurrentMembershipProviderInterface:
        alias: App\Organizations\Infrastructure\Context\UnavailableCurrentMembershipProvider

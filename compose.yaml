services:
  app:
    build:
      context: .
      target: development
    working_dir: /app
    environment:
      APP_ENV: dev
      DATABASE_URL: mysql://safe_score:safe_score@database:3306/safe_score?charset=utf8mb4
      DATABASE_SERVER_VERSION: "8.4"
    volumes:
      - ./:/app
    depends_on:
      database:
        condition: service_healthy

  database:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: safe_score
      MYSQL_PASSWORD: safe_score
      MYSQL_ROOT_PASSWORD: change-me
      MYSQL_USER: safe_score
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pchange-me"]
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - database_data:/var/lib/mysql

volumes:
  database_data:

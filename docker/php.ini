[PHP]
date.timezone = UTC
memory_limit = 256M
max_execution_time = 120
post_max_size = 20M
upload_max_filesize = 20M
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

[opcache]
opcache.enable = 1
opcache.enable_cli = 1
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
